<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Forgot Password — OnePortfolio</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='20260215-1') }}">
    <style>
        .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { width: 100%; max-width: 420px; border-radius: var(--border-radius-lg) !important; box-shadow: var(--shadow-xl) !important; }
        .auth-logo { width: 48px; height: 48px; border-radius: 10px; }
        .auth-title { font-size: 1.5rem; font-weight: 500; color: var(--text-primary); }
        .auth-subtitle { color: var(--text-tertiary); font-size: 0.9rem; }
        .form-control-auth { padding: 0.75rem 1rem; font-size: 0.9375rem; }
        .btn-auth { padding: 0.75rem 1rem; font-size: 0.9375rem; font-weight: 500; }
        .field-wrap { position: relative; }
        .field-wrap .fi { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
        .field-wrap input { padding-left: 2.25rem; }
    </style>
</head>
<body>
<div class="auth-page">
    <div class="auth-card card p-4 p-md-5">

        <!-- Header -->
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='icons/icon.svg') }}" alt="Logo" class="auth-logo mb-3">
            <h1 class="auth-title">Reset your password</h1>
            <p class="auth-subtitle mb-0">Enter your email and we'll send you a reset link.</p>
        </div>

        <!-- General error -->
        {% if form_errors.get('__all__') %}
            <div class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>{{ form_errors['__all__'] }}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post" action="{{ url_for('auth.forgot_password') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Email -->
            <div class="mb-4">
                <label for="email" class="form-label">Email Address</label>
                <div class="field-wrap">
                    <i class="bi bi-envelope fi"></i>
                    <input type="email" id="email" name="email" autocomplete="email"
                           class="form-control form-control-auth {% if form_errors.get('email') %}is-invalid{% endif %}"
                           value="{{ form_values.get('email', '') }}"
                           placeholder="you@example.com" autofocus required>
                </div>
                {% if form_errors.get('email') %}
                    <div class="invalid-feedback d-block mt-1">{{ form_errors['email'] }}</div>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary btn-auth w-100">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('auth.login') }}" class="auth-subtitle">
                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const saved = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-bs-theme', saved || (systemDark ? 'dark' : 'light'));
    })();
</script>
</body>
</html>
