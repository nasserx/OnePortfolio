<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Forgot Password — OnePortfolio</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card card p-4">

        <!-- Header -->
        <div class="text-center mb-3">
            <img src="{{ url_for('static', filename='icons/icon.svg') }}" alt="Logo" class="auth-logo mb-3">
            <h1 class="auth-title">Reset your password</h1>
            <p class="auth-subtitle mb-0">Enter your email and we'll send you a reset link.</p>
        </div>

        <!-- General error -->
        {% if form_errors.get('__all__') %}
            <div class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-circle me-2"></i>{{ form_errors['__all__'] }}
            </div>
        {% endif %}

        <!-- Form -->
        <form method="post" action="{{ url_for('auth.forgot_password') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <!-- Email -->
            <div class="mb-3">
                <div class="field-wrap">
                    <i class="bi bi-envelope fi"></i>
                    <input type="email" id="email" name="email" autocomplete="email"
                           class="form-control form-control-auth {% if form_errors.get('email') %}is-invalid{% endif %}"
                           value="{{ form_values.get('email', '') }}"
                           placeholder="you@example.com" autofocus required>
                </div>
                {% if form_errors.get('email') %}
                    <div class="invalid-feedback d-block mt-1">{{ form_errors['email'] }}</div>
                {% endif %}
            </div>

            <button type="submit" class="btn btn-primary btn-auth w-100">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('auth.login') }}" class="auth-subtitle">
                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const saved = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-bs-theme', saved || (systemDark ? 'dark' : 'light'));
    })();
</script>
</body>
</html>
