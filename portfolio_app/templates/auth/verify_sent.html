<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email — OnePortfolio</title>
    <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card card p-4 text-center">

        <div class="icon-circle">
            <i class="bi bi-envelope-check fs-2 text-primary"></i>
        </div>

        <h1 class="h4 fw-500 mb-2">Check your inbox</h1>
        <p class="text-secondary mb-4">
            We've sent a verification link to your email address.<br>
            Click the link to activate your account.
        </p>

        <p class="text-secondary" style="font-size:0.875rem;">
            Didn't receive it? Check your spam folder, or
            <a href="{{ url_for('auth.register') }}">try registering again</a>.
        </p>

        <hr class="my-4">

        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Sign In
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        const saved = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-bs-theme', saved || (systemDark ? 'dark' : 'light'));
    })();
</script>
</body>
</html>
