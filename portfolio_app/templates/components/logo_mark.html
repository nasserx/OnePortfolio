{% set brand_logo_size = logo_size|default(32) %}
{% set brand_logo_decorative = logo_decorative|default(true) %}
<img
    src="{{ url_for('static', filename='icons/favicon.svg') }}"
    width="{{ brand_logo_size }}"
    height="{{ brand_logo_size }}"
    class="brand-logo {{ logo_class|default('op-logo-mark') }}"
    {% if brand_logo_decorative %}
        alt=""
        aria-hidden="true"
    {% else %}
        alt="{{ logo_alt|default('OnePortfolio') }}"
    {% endif %}
    decoding="async"
>
