{% extends 'auth_base.html' %}

{% block title %}Rate limit reached — OnePortfolio{% endblock %}

{% block auth_content %}

    <div class="text-center mb-4">
        <div class="icon-circle">
            <i class="bi bi-hourglass-split fs-2" aria-hidden="true"></i>
        </div>
        <h1 class="h4 fw-500 mb-1">Slow down for a moment</h1>
        <p class="auth-subtitle mb-0">{{ message }}</p>
    </div>

    <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-secondary btn-sm w-100">
        <i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Back home
    </a>

{% endblock %}
